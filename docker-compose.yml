services:
  db:
    image: postgres:16
    container_name: mtg-db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: mtg-api
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: mtg-web
    ports:
      - "4200:80"
    env_file:
      - .env
    depends_on:
      - api

volumes:
  db-data: